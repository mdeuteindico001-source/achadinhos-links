<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Múltiplas Ofertas — as melhores ofertas em um só lugar</title>
<meta name="description" content="Shopee, Mercado Livre, TikTok Shop e muito mais. Descontos exclusivos todos os dias, direto no seu WhatsApp.">
<meta property="og:title" content="Múltiplas Ofertas — as melhores ofertas em um só lugar">
<meta property="og:description" content="Entre no Grupo VIP e receba as melhores ofertas antes de todo mundo.">
<meta property="og:image" content="capa.jpg">
<meta property="og:type" content="website">
<meta name="theme-color" content="#D1020C">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
<script src="config.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #C40106; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100dvh;
    display: grid; place-items: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* A arte tem proporção 1:1.5. Para caber inteira na altura da tela,
     a largura precisa ser no máximo (altura / 1.5) = 66.6dvh. */
  .pagina {
    position: relative;
    width: min(100%, 62dvh, 440px);
  }
  .capa { width: 100%; height: auto; display: block; }

  /* botão transparente posicionado exatamente sobre o CTA verde da arte */
  .botao-grupo {
    position: absolute;
    left: var(--bl); top: var(--bt); width: var(--bw); height: var(--bh);
    border-radius: 14px; display: block;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  /* estende a área clicável para no mínimo 46px de altura, sem mudar o visual
     (em telas pequenas o botão da arte fica com ~37px, abaixo do confortável) */
  .botao-grupo::after {
    content: ''; position: absolute; left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    height: max(100%, 46px);
  }
  .botao-grupo:hover { transform: scale(1.02); box-shadow: 0 0 0 4px rgba(255,255,255,.5); }
  .botao-grupo:active { transform: scale(.98); }
  .botao-grupo:focus-visible { outline: 4px solid #fff; outline-offset: 3px; }
  .debug .botao-grupo { background: rgba(0,132,255,.45); box-shadow: 0 0 0 3px #0084FF; }
  .debug .botao-grupo::after { background: rgba(255,193,7,.35); }

  .aviso {
    position: absolute; left: 6%; width: 88%; top: 84%;
    background: #fff; border: 3px solid #14110F; border-radius: 14px;
    padding: 14px; text-align: center; font-weight: 800; font-size: .95rem; color: #14110F;
  }
  @media (prefers-reduced-motion: reduce) { .botao-grupo { transition: none; } }
</style>
</head>
<body>
  <main class="pagina" id="pagina">
    <img class="capa" src="capa.jpg" width="1024" height="1536"
         alt="Múltiplas Ofertas — Shopee, Mercado Livre, TikTok Shop e muito mais. Ofertas atualizadas todos os dias. Entre agora no Grupo VIP.">
  </main>

<script>
(function () {
  // ---------- Pixel da Meta (só carrega se houver ID) ----------
  if (CONFIG.pixelId) {
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
    (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', CONFIG.pixelId);
    fbq('track', 'PageView');
  }

  var pagina = document.getElementById('pagina');
  if (CONFIG.debug) pagina.classList.add('debug');

  var destino = destinoAtual();
  if (destino) {
    var a = document.createElement('a');
    a.className = 'botao-grupo';
    a.href = destino.url;
    a.rel = 'noopener';
    // sem texto visível: o nome acessível vem do aria-label (a arte já mostra o rótulo)
    a.setAttribute('aria-label', destino.rotulo);
    a.style.setProperty('--bl', BOTAO.left + '%');
    a.style.setProperty('--bt', BOTAO.top + '%');
    a.style.setProperty('--bw', BOTAO.width + '%');
    a.style.setProperty('--bh', BOTAO.height + '%');
    a.addEventListener('click', function () {
      if (CONFIG.pixelId && window.fbq) fbq('track', 'Lead');
    });
    pagina.appendChild(a);
  } else {
    var p = document.createElement('p');
    p.className = 'aviso';
    p.textContent = '⏳ Estamos abrindo uma turma nova. Volte em alguns minutos!';
    pagina.appendChild(p);
  }
})();
</script>
</body>
</html>
