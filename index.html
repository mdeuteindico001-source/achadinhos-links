<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Múltiplas Ofertas — as melhores ofertas em um só lugar</title>
<meta name="description" content="Shopee, Mercado Livre, TikTok Shop e muito mais. Descontos exclusivos todos os dias, direto no seu WhatsApp.">
<meta property="og:title" content="Múltiplas Ofertas — as melhores ofertas em um só lugar">
<meta property="og:description" content="Entre no Grupo VIP e receba as melhores ofertas antes de todo mundo.">
<meta property="og:image" content="capa.jpg">
<meta property="og:type" content="website">
<meta name="theme-color" content="#D1020C">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">

<!-- ============================================================
     CONFIGURAÇÃO — é só aqui que você mexe no dia a dia.
     Quando um grupo lotar (1.024), marque cheio: true.
     A página passa a oferecer o próximo automaticamente.
     ============================================================ -->
<script>
const CONFIG = {
  // Canal do WhatsApp — se ativo, vira o destino do botão
  canal: {
    link: 'https://whatsapp.com/channel/COLE_O_CODIGO_AQUI',
    ativo: false
  },

  // Grupos — o primeiro com "cheio: false" é o que o botão abre
  grupos: [
    { nome: 'Múltiplas Ofertas • Grupo 1', link: 'https://chat.whatsapp.com/LPj7N26xYNxKJ44WrhPBTz', cheio: false },
    // { nome: 'Múltiplas Ofertas • Grupo 2', link: 'https://chat.whatsapp.com/XXXX', cheio: false },
  ],

  // ID do Pixel da Meta (deixe '' se ainda não tiver)
  pixelId: '',

  // true = mostra o contorno do botão, para conferir o posicionamento
  debug: false
};

/* Posição do botão sobre a arte (medida na imagem 864x1821).
   Só mexa aqui se trocar a imagem da capa. */
const BOTAO = { left: 14.35, top: 88.03, width: 66.67, height: 4.94 };
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #C40106; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center;
    min-height: 100dvh;
  }
  .pagina { position: relative; width: 100%; max-width: 480px; }
  .capa { width: 100%; height: auto; display: block; }

  /* botão invisível posicionado exatamente sobre o CTA verde da arte */
  .botao-grupo {
    position: absolute;
    left: var(--bl); top: var(--bt); width: var(--bw); height: var(--bh);
    border-radius: 12px;
    display: block; text-indent: -9999px; overflow: hidden;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .botao-grupo:hover { transform: scale(1.02); box-shadow: 0 0 0 4px rgba(255,255,255,.45); }
  .botao-grupo:active { transform: scale(.98); }
  .botao-grupo:focus-visible { outline: 4px solid #fff; outline-offset: 3px; }
  .debug .botao-grupo { background: rgba(0,132,255,.45); box-shadow: 0 0 0 3px #0084FF; }

  /* aviso caso não haja grupo com vaga */
  .aviso {
    position: absolute; left: 6%; width: 88%;
    top: 86%;
    background: #fff; border: 3px solid #14110F; border-radius: 14px;
    padding: 14px; text-align: center; font-weight: 800; font-size: .95rem; color: #14110F;
  }
</style>
</head>
<body>
  <main class="pagina" id="pagina">
    <img class="capa" src="capa.jpg" alt="Múltiplas Ofertas — Shopee, Mercado Livre, TikTok Shop e muito mais. Ofertas atualizadas todos os dias. Entre agora no Grupo VIP." width="864" height="1821">
  </main>

<script>
(function () {
  // ---------- Pixel da Meta (só carrega se houver ID) ----------
  if (CONFIG.pixelId) {
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
    (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', CONFIG.pixelId);
    fbq('track', 'PageView');
  }

  var pagina = document.getElementById('pagina');
  if (CONFIG.debug) pagina.classList.add('debug');

  // ---------- Descobre o destino ----------
  var temCanal = CONFIG.canal.ativo && CONFIG.canal.link.indexOf('COLE_O_CODIGO_AQUI') === -1;
  var vaga = CONFIG.grupos.filter(function (g) {
    return !g.cheio && g.link.indexOf('COLE_AQUI') === -1;
  })[0];
  var destino = temCanal ? CONFIG.canal.link : (vaga ? vaga.link : null);

  if (destino) {
    var a = document.createElement('a');
    a.className = 'botao-grupo';
    a.href = destino;
    a.rel = 'noopener';
    a.textContent = temCanal ? 'Entrar no canal' : 'Entrar no Grupo VIP';
    a.setAttribute('aria-label', a.textContent);
    a.style.setProperty('--bl', BOTAO.left + '%');
    a.style.setProperty('--bt', BOTAO.top + '%');
    a.style.setProperty('--bw', BOTAO.width + '%');
    a.style.setProperty('--bh', BOTAO.height + '%');
    a.addEventListener('click', function () {
      if (CONFIG.pixelId && window.fbq) fbq('track', 'Lead');
    });
    pagina.appendChild(a);
  } else {
    var p = document.createElement('p');
    p.className = 'aviso';
    p.textContent = '⏳ Estamos abrindo uma turma nova. Volte em alguns minutos!';
    pagina.appendChild(p);
  }
})();
</script>
</body>
</html>
